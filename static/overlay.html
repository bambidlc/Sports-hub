<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Courtside Score Overlay</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Unbounded:wght@600&display=swap');

    * { box-sizing: border-box; }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      font-family: "Space Grotesk", "Segoe UI", sans-serif;
      background: transparent;
      overflow: hidden;
    }

    .frame {
      position: fixed;
      left: 0;
      right: 0;
      top: 0;
      display: grid;
      justify-items: center;
      padding: 16px;
    }

    .board {
      width: min(960px, calc(100vw - 24px));
      display: grid;
      gap: 8px;
      color: #f8fafc;
      text-shadow: 0 1px 2px rgba(2, 6, 23, 0.45);
    }

    .meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 6px 12px;
      border-radius: 10px;
      border: 1px solid rgba(148, 163, 184, 0.45);
      background: rgba(2, 6, 23, 0.68);
      backdrop-filter: blur(2px);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      font-size: 0.72rem;
    }

    .scores {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid rgba(148, 163, 184, 0.45);
      background: rgba(2, 6, 23, 0.82);
      backdrop-filter: blur(3px);
    }

    .team {
      display: grid;
      justify-items: center;
      gap: 3px;
      min-width: 0;
    }

    .team-name {
      font-size: 0.74rem;
      letter-spacing: 0.11em;
      text-transform: uppercase;
      color: #cbd5e1;
      max-width: 100%;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .team-score {
      font-family: "Unbounded", "Space Grotesk", sans-serif;
      font-size: 1.8rem;
      line-height: 1;
      color: #f8fafc;
    }

    .center {
      display: grid;
      justify-items: center;
      gap: 2px;
      min-width: 90px;
    }

    .period {
      font-family: "Unbounded", "Space Grotesk", sans-serif;
      color: #fcd34d;
      font-size: 1.05rem;
      line-height: 1;
    }

    .period-label {
      color: #94a3b8;
      font-size: 0.62rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }

    .hint {
      color: #e2e8f0;
      border: 1px dashed rgba(148, 163, 184, 0.5);
      background: rgba(2, 6, 23, 0.65);
      border-radius: 10px;
      padding: 8px 12px;
      font-size: 0.82rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      display: none;
    }

    .hint.show {
      display: block;
    }

    @media (max-width: 680px) {
      .scores {
        grid-template-columns: 1fr;
        text-align: center;
      }

      .center {
        min-width: 0;
      }
    }
  </style>
</head>
<body>
  <div class="frame">
    <div class="board">
      <div class="meta">
        <span id="matchName">No Match</span>
        <span id="statusTag">Idle</span>
      </div>
      <div class="scores">
        <div class="team">
          <div class="team-name" id="homeName">Home</div>
          <div class="team-score" id="homeScore">0</div>
        </div>
        <div class="center">
          <div class="period" id="periodValue">-</div>
          <div class="period-label">Period</div>
        </div>
        <div class="team">
          <div class="team-name" id="awayName">Away</div>
          <div class="team-score" id="awayScore">0</div>
        </div>
      </div>
      <div class="hint" id="hint">Waiting for live data</div>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const pollMs = Math.max(1000, Number.parseInt(params.get("poll") || "2000", 10) || 2000);
    let activeMatchId = params.get("match_id") || params.get("match") || "";
    let pollHandle = null;

    const matchNameEl = document.getElementById("matchName");
    const statusTagEl = document.getElementById("statusTag");
    const homeNameEl = document.getElementById("homeName");
    const awayNameEl = document.getElementById("awayName");
    const homeScoreEl = document.getElementById("homeScore");
    const awayScoreEl = document.getElementById("awayScore");
    const periodValueEl = document.getElementById("periodValue");
    const hintEl = document.getElementById("hint");

    function formatPeriod(value) {
      if (!value) return "-";
      const key = String(value).toLowerCase();
      if (key === "ot") return "OT";
      if (key === "q1") return "Q1";
      if (key === "q2") return "Q2";
      if (key === "q3") return "Q3";
      if (key === "q4") return "Q4";
      return String(value).toUpperCase();
    }

    function setHint(message, show) {
      hintEl.textContent = message;
      hintEl.classList.toggle("show", Boolean(show));
    }

    async function getJson(url) {
      const response = await fetch(url, { cache: "no-store" });
      if (!response.ok) return null;
      return response.json();
    }

    async function resolveMatchId() {
      if (activeMatchId) return activeMatchId;
      const data = await getJson("/api/sessions");
      const sessions = data?.sessions || [];
      const liveSession = sessions.find((session) => !session.finalized_at);
      activeMatchId = (liveSession || sessions[0] || {}).match_id || "";
      return activeMatchId;
    }

    async function refreshOverlay() {
      const matchId = await resolveMatchId();
      if (!matchId) {
        setHint("Start a game in Courtside Stats to show overlay", true);
        return;
      }

      const [sessionResp, statsResp, eventsResp] = await Promise.all([
        getJson(`/api/session?match_id=${encodeURIComponent(matchId)}`),
        getJson(`/api/stats?match_id=${encodeURIComponent(matchId)}`),
        getJson(`/api/events?match_id=${encodeURIComponent(matchId)}`)
      ]);

      const session = sessionResp?.session;
      if (!session || !Object.keys(session).length) {
        setHint("No active session for selected match", true);
        return;
      }

      matchNameEl.textContent = session.match_name || session.match_id || "Live Match";
      statusTagEl.textContent = session.finalized_at ? "Final" : "Live";
      homeNameEl.textContent = session.home_team_name || session.home_team_id || "Home";
      awayNameEl.textContent = session.away_team_name || session.away_team_id || "Away";
      homeScoreEl.textContent = statsResp?.home_score ?? 0;
      awayScoreEl.textContent = statsResp?.away_score ?? 0;

      const events = eventsResp?.events || [];
      const lastEvent = events.length ? events[events.length - 1] : null;
      periodValueEl.textContent = formatPeriod(lastEvent?.period);
      setHint("", false);
    }

    (async () => {
      await refreshOverlay();
      pollHandle = setInterval(refreshOverlay, pollMs);
    })();

    window.addEventListener("beforeunload", () => {
      if (pollHandle) clearInterval(pollHandle);
    });
  </script>
</body>
</html>
