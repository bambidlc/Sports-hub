<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>Live Stream — Sports Hub</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800&family=Unbounded:wght@700;800&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
html,body{
  width:100%;height:100%;overflow:hidden;
  font-family:"Inter",system-ui,sans-serif;
  background:#000;color:#fff;
  -webkit-user-select:none;user-select:none;
  -webkit-touch-callout:none;
}

/* Camera feed fills entire screen */
#cameraView{
  position:fixed;top:0;left:0;width:100%;height:100%;
  object-fit:cover;z-index:0;
  background:#111;
}

/* Overlay elements on top of camera */
.overlay{
  position:fixed;top:0;left:0;width:100%;height:100%;
  z-index:10;display:flex;flex-direction:column;
  pointer-events:none;
}
.overlay>*{pointer-events:auto}

/* Score bug — top of screen */
.score-bug{
  display:flex;align-items:stretch;
  margin:8px auto 0;
  border-radius:10px;overflow:hidden;
  box-shadow:0 4px 20px rgba(0,0,0,0.5);
  font-size:0;
  max-width:360px;width:92%;
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
}
.sb-team{
  flex:1;display:flex;align-items:center;gap:6px;
  padding:6px 10px;
  font-size:0.72rem;font-weight:800;
  text-shadow:0 1px 3px rgba(0,0,0,0.4);
  white-space:nowrap;overflow:hidden;
}
.sb-team.home{justify-content:flex-start}
.sb-team.away{justify-content:flex-end;flex-direction:row-reverse}
.sb-team .emoji{font-size:1rem;flex-shrink:0}
.sb-team .tname{overflow:hidden;text-overflow:ellipsis}

.sb-center{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:4px 14px;background:rgba(0,0,0,0.8);min-width:80px;
}
.sb-scores{
  font-family:"Unbounded",sans-serif;font-size:1.2rem;font-weight:800;
  letter-spacing:0.04em;white-space:nowrap;line-height:1.1;
}
.sb-meta{display:flex;align-items:center;gap:4px}
.sb-period{font-size:0.55rem;font-weight:700;opacity:0.7;letter-spacing:0.1em;text-transform:uppercase}
.sb-live{
  font-size:0.5rem;font-weight:800;letter-spacing:0.12em;
  background:#ef4444;color:#fff;padding:1px 6px;border-radius:999px;
  animation:blink 1.5s infinite;
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.4}}

/* Bottom controls */
.bottom-bar{
  margin-top:auto;
  padding:0 8px 12px;
  display:flex;flex-direction:column;gap:6px;
}

/* Camera controls */
.cam-controls{
  display:flex;gap:6px;justify-content:center;
}
.cam-btn{
  display:flex;align-items:center;justify-content:center;gap:4px;
  padding:8px 14px;border-radius:999px;border:none;
  background:rgba(255,255,255,0.15);backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
  color:#fff;font-weight:700;font-size:0.72rem;
  cursor:pointer;font-family:inherit;
  transition:all .15s;
}
.cam-btn:active{transform:scale(0.95);background:rgba(255,255,255,0.25)}
.cam-btn.recording{background:rgba(239,68,68,0.6)}
.cam-btn.primary{background:rgba(99,102,241,0.5)}

/* Stats mini bar */
.stats-mini{
  display:flex;gap:4px;justify-content:center;flex-wrap:wrap;
}
.stat-chip{
  padding:3px 8px;border-radius:8px;font-size:0.62rem;font-weight:700;
  background:rgba(0,0,0,0.5);backdrop-filter:blur(6px);
  -webkit-backdrop-filter:blur(6px);
  border:1px solid rgba(255,255,255,0.1);
}
.stat-chip .val{color:#fbbf24}

/* Fullscreen stats panel */
.stats-panel{
  position:fixed;bottom:0;left:0;right:0;
  background:rgba(0,0,0,0.85);backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
  border-radius:16px 16px 0 0;
  padding:14px;max-height:55vh;overflow-y:auto;
  z-index:20;transform:translateY(100%);
  transition:transform .3s ease;
}
.stats-panel.open{transform:translateY(0)}
.stats-panel h3{
  font-size:0.7rem;text-transform:uppercase;letter-spacing:0.1em;
  color:#94a3b8;margin-bottom:8px;
}
.stats-panel table{width:100%;border-collapse:collapse;font-size:0.7rem}
.stats-panel th{
  text-align:left;padding:4px 6px;font-size:0.6rem;text-transform:uppercase;
  letter-spacing:0.06em;color:#64748b;border-bottom:1px solid rgba(255,255,255,0.1);
}
.stats-panel td{padding:4px 6px;border-bottom:1px solid rgba(255,255,255,0.05)}
.stats-panel td:first-child{font-weight:700}
.stats-panel .close-stats{
  display:block;width:100%;padding:10px;border:none;border-radius:10px;
  background:rgba(255,255,255,0.1);color:#fff;font-weight:700;
  font-size:0.8rem;cursor:pointer;margin-top:8px;font-family:inherit;
}

/* No camera fallback */
.no-cam{
  position:fixed;top:0;left:0;width:100%;height:100%;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:linear-gradient(135deg,#1e1b4b,#312e81,#1e1b4b);
  z-index:0;gap:12px;
}
.no-cam .icon{font-size:3rem}
.no-cam p{color:#94a3b8;font-size:0.85rem;text-align:center;max-width:280px}
.no-cam button{
  padding:12px 24px;border-radius:12px;border:none;
  background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;
  font-weight:700;font-size:0.9rem;cursor:pointer;font-family:inherit;
}

/* Hide elements when no match */
.hidden{display:none!important}
</style>
</head>
<body>

<!-- Camera video element -->
<video id="cameraView" autoplay playsinline muted></video>

<!-- No camera fallback -->
<div class="no-cam" id="noCam">
  <span class="icon">📹</span>
  <p>Tap below to activate your camera and start streaming the game</p>
  <button onclick="startCamera()">🎥 Start Camera</button>
</div>

<!-- Score overlay -->
<div class="overlay" id="overlayUI">
  <!-- Score bug -->
  <div class="score-bug" id="scoreBug">
    <div class="sb-team home" id="homeBlock">
      <span class="emoji" id="he">🏀</span>
      <span class="tname" id="hn">Home</span>
    </div>
    <div class="sb-center">
      <div class="sb-scores"><span id="hs">0</span> — <span id="as">0</span></div>
      <div class="sb-meta">
        <span class="sb-period" id="period">Q1</span>
        <span class="sb-live" id="liveTag">● LIVE</span>
      </div>
    </div>
    <div class="sb-team away" id="awayBlock">
      <span class="emoji" id="ae">🏀</span>
      <span class="tname" id="an">Away</span>
    </div>
  </div>

  <!-- Bottom controls -->
  <div class="bottom-bar">
    <!-- Mini stats -->
    <div class="stats-mini" id="statsMini"></div>

    <!-- Camera controls -->
    <div class="cam-controls">
      <button class="cam-btn" onclick="flipCamera()" id="flipBtn">🔄 Flip</button>
      <button class="cam-btn primary" onclick="toggleStats()">📊 Stats</button>
      <button class="cam-btn" onclick="toggleScoreBug()">👁 Score</button>
    </div>
  </div>
</div>

<!-- Stats panel (slides up) -->
<div class="stats-panel" id="statsPanel">
  <h3 id="statsTitle">Player Stats</h3>
  <table>
    <thead id="statsHead"></thead>
    <tbody id="statsBody"></tbody>
  </table>
  <button class="close-stats" onclick="toggleStats()">Close Stats</button>
</div>

<script>
const matchId = new URLSearchParams(location.search).get('id');
let currentFacing = 'environment'; // back camera default
let stream = null;
let scoreBugVisible = true;

// ── Camera ──
async function startCamera() {
  try {
    if (stream) {
      stream.getTracks().forEach(t => t.stop());
    }
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: currentFacing, width: { ideal: 1920 }, height: { ideal: 1080 } },
      audio: false
    });
    document.getElementById('cameraView').srcObject = stream;
    document.getElementById('noCam').classList.add('hidden');
  } catch (e) {
    console.log('Camera error:', e);
    // Keep the fallback visible
  }
}

async function flipCamera() {
  currentFacing = currentFacing === 'environment' ? 'user' : 'environment';
  await startCamera();
}

function toggleScoreBug() {
  scoreBugVisible = !scoreBugVisible;
  document.getElementById('scoreBug').style.display = scoreBugVisible ? '' : 'none';
}

function toggleStats() {
  document.getElementById('statsPanel').classList.toggle('open');
}

// ── Color helpers ──
function adjustColor(hex, amt) {
  if (!hex || hex.length < 7) return hex || '#3b82f6';
  let r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  r = Math.max(0, Math.min(255, r + amt));
  g = Math.max(0, Math.min(255, g + amt));
  b = Math.max(0, Math.min(255, b + amt));
  return '#' + [r,g,b].map(c => c.toString(16).padStart(2,'0')).join('');
}

// ── Data loading ──
async function load() {
  if (!matchId) return;
  try {
    const r = await fetch('/api/match?id=' + matchId);
    const d = await r.json();
    if (d.error) return;
    const m = d.match, ht = d.home_team, at = d.away_team;
    const sport = m.sport;

    // Score bug
    document.getElementById('he').textContent = ht.logo_emoji;
    document.getElementById('ae').textContent = at.logo_emoji;
    document.getElementById('hn').textContent = ht.name;
    document.getElementById('an').textContent = at.name;
    document.getElementById('hs').textContent = m.home_score;
    document.getElementById('as').textContent = m.away_score;
    document.getElementById('period').textContent =
      sport === 'volleyball' ? 'SET ' + m.period : 'Q' + m.period;

    // Team colors
    const hb = document.getElementById('homeBlock');
    const ab = document.getElementById('awayBlock');
    hb.style.background = `linear-gradient(135deg,${ht.color},${adjustColor(ht.color,-30)})`;
    ab.style.background = `linear-gradient(135deg,${at.color},${adjustColor(at.color,-30)})`;

    // Live tag
    const lt = document.getElementById('liveTag');
    if (m.status === 'live') {
      lt.style.display = '';
      lt.textContent = '● LIVE';
      lt.style.background = '#ef4444';
    } else if (m.status === 'final') {
      lt.style.display = '';
      lt.textContent = 'FINAL';
      lt.style.background = '#64748b';
      lt.style.animation = 'none';
    } else {
      lt.style.display = 'none';
    }

    // Mini stats (top scorers)
    const stats = d.player_stats || [];
    const mini = document.getElementById('statsMini');
    if (sport === 'basketball') {
      const top = stats.sort((a,b) => (b.points||0) - (a.points||0)).slice(0, 4);
      mini.innerHTML = top.map(p =>
        `<div class="stat-chip">${p.name.split(' ')[0]} <span class="val">${p.points||0}pts</span></div>`
      ).join('');
    } else {
      const top = stats.sort((a,b) => ((b.kills||0)+(b.aces||0)) - ((a.kills||0)+(a.aces||0))).slice(0, 4);
      mini.innerHTML = top.map(p =>
        `<div class="stat-chip">${p.name.split(' ')[0]} <span class="val">${p.kills||0}K</span></div>`
      ).join('');
    }

    // Full stats panel
    if (sport === 'basketball') {
      document.getElementById('statsHead').innerHTML =
        '<tr><th>Player</th><th>PTS</th><th>AST</th><th>REB</th><th>STL</th><th>FLS</th></tr>';
      document.getElementById('statsBody').innerHTML = stats.map(p => `
        <tr><td>${p.name}</td><td>${p.points||0}</td><td>${p.assists||0}</td>
        <td>${p.rebounds||0}</td><td>${p.steals||0}</td><td>${p.fouls||0}</td></tr>
      `).join('');
    } else {
      document.getElementById('statsHead').innerHTML =
        '<tr><th>Player</th><th>K</th><th>ACE</th><th>BLK</th><th>DIG</th><th>AST</th></tr>';
      document.getElementById('statsBody').innerHTML = stats.map(p => `
        <tr><td>${p.name}</td><td>${p.kills||0}</td><td>${p.aces||0}</td>
        <td>${p.blocks||0}</td><td>${p.digs||0}</td><td>${p.assists||0}</td></tr>
      `).join('');
    }
  } catch(e) { console.log('Load error:', e); }
}

// Auto-refresh
if (matchId) {
  load();
  setInterval(load, 2000);
}

// Try to auto-start camera
startCamera();
</script>
</body>
</html>
