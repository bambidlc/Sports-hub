<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>Stream Overlay — Sports Hub</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@600;700;800&family=Unbounded:wght@700;800&display=swap');
*{box-sizing:border-box;margin:0;padding:0}

/* Transparent background for OBS / streaming overlay use */
body{
  font-family:"Inter",sans-serif;
  background:transparent;
  color:#fff;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:12px;
}

/* The overlay bar - designed to be placed on top of a stream */
.overlay-bar{
  display:flex;
  align-items:stretch;
  border-radius:16px;
  overflow:hidden;
  box-shadow:0 8px 32px rgba(0,0,0,0.3);
  max-width:600px;
  width:100%;
  backdrop-filter:blur(20px);
}

.team-block{
  flex:1;display:flex;align-items:center;gap:10px;padding:14px 18px;
}
.team-block.home{
  background:linear-gradient(135deg,var(--hc,#3b82f6) 0%,var(--hc2,#2563eb) 100%);
  justify-content:flex-start;
}
.team-block.away{
  background:linear-gradient(135deg,var(--ac,#ef4444) 0%,var(--ac2,#dc2626) 100%);
  justify-content:flex-end;
  flex-direction:row-reverse;
}
.team-block .emoji{font-size:1.6rem}
.team-block .info{display:flex;flex-direction:column}
.team-block .tname{font-weight:800;font-size:0.9rem;line-height:1.1;text-shadow:0 1px 4px rgba(0,0,0,0.3)}
.team-block .tname small{font-weight:600;font-size:0.7rem;opacity:0.8}

.score-mid{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:8px 20px;background:rgba(0,0,0,0.7);min-width:100px;
}
.score-mid .scores{
  font-family:"Unbounded",sans-serif;font-size:1.6rem;font-weight:800;
  letter-spacing:0.06em;white-space:nowrap;
}
.score-mid .period{font-size:0.65rem;font-weight:700;opacity:0.7;letter-spacing:0.12em;text-transform:uppercase}
.score-mid .live-tag{
  font-size:0.55rem;font-weight:800;letter-spacing:0.15em;
  background:#ef4444;color:#fff;padding:2px 8px;border-radius:999px;
  margin-top:2px;animation:blink 1.5s infinite;
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.5}}

/* Full scoreboard mode (for iPhone streaming) */
.full-mode{
  width:100%;max-width:500px;margin-top:16px;
  background:rgba(255,255,255,0.95);border-radius:20px;
  color:#1e293b;padding:20px;
  box-shadow:0 12px 40px rgba(0,0,0,0.15);
  display:none;
}
.full-mode.show{display:block}
.full-mode h3{
  font-family:"Unbounded",sans-serif;font-size:0.85rem;
  color:#64748b;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:12px;
}
.full-mode table{width:100%;border-collapse:collapse;font-size:0.8rem}
.full-mode th{
  text-align:left;padding:6px 8px;font-size:0.68rem;text-transform:uppercase;
  letter-spacing:0.08em;color:#94a3b8;border-bottom:2px solid #e2e8f0;
}
.full-mode td{padding:6px 8px;border-bottom:1px solid #f1f5f9}
.full-mode td:first-child{font-weight:700}

/* iPhone mode toggle */
.mode-toggle{
  margin-top:16px;padding:10px 20px;border-radius:12px;
  background:rgba(255,255,255,0.15);backdrop-filter:blur(8px);
  border:1px solid rgba(255,255,255,0.2);color:#fff;font-weight:700;
  cursor:pointer;font-family:inherit;font-size:0.85rem;
}
.mode-toggle:hover{background:rgba(255,255,255,0.25)}

/* Minimal mode for clean overlay */
.minimal .full-mode{display:none!important}
.minimal .mode-toggle{display:none}

/* Preview background */
.preview-bg{
  position:fixed;top:0;left:0;right:0;bottom:0;z-index:-1;
  background:
    linear-gradient(135deg,#667eea 0%,#764ba2 100%);
}
</style>
</head>
<body>
<div class="preview-bg" id="previewBg"></div>

<div class="overlay-bar" id="overlayBar">
  <div class="team-block home" id="homeBlock">
    <span class="emoji" id="he">🏀</span>
    <div class="info">
      <span class="tname" id="hn">Home</span>
    </div>
  </div>
  <div class="score-mid">
    <div class="scores"><span id="hs">0</span> — <span id="as">0</span></div>
    <div class="period" id="period">Q1</div>
    <div class="live-tag" id="liveTag">● LIVE</div>
  </div>
  <div class="team-block away" id="awayBlock">
    <span class="emoji" id="ae">🏀</span>
    <div class="info">
      <span class="tname" id="an">Away</span>
    </div>
  </div>
</div>

<button class="mode-toggle" onclick="toggleFull()">📊 Show Full Stats</button>

<div class="full-mode" id="fullStats">
  <h3 id="fullTitle">Player Stats</h3>
  <table>
    <thead id="fullHead"></thead>
    <tbody id="fullBody"></tbody>
  </table>
</div>

<script>
const matchId = new URLSearchParams(location.search).get('id');
const isMinimal = new URLSearchParams(location.search).get('minimal') === '1';
const noBg = new URLSearchParams(location.search).get('nobg') === '1';

if (isMinimal) document.body.classList.add('minimal');
if (noBg) document.getElementById('previewBg').style.display = 'none';

let showFull = false;
function toggleFull() {
  showFull = !showFull;
  document.getElementById('fullStats').classList.toggle('show', showFull);
}

function adjustColor(hex, amt) {
  let r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  r = Math.max(0, Math.min(255, r + amt));
  g = Math.max(0, Math.min(255, g + amt));
  b = Math.max(0, Math.min(255, b + amt));
  return '#' + [r,g,b].map(c => c.toString(16).padStart(2,'0')).join('');
}

async function load() {
  try {
    const r = await fetch('/api/match?id=' + matchId);
    const d = await r.json();
    if (d.error) return;
    const m = d.match, ht = d.home_team, at = d.away_team;
    const sport = m.sport;

    document.getElementById('he').textContent = ht.logo_emoji;
    document.getElementById('ae').textContent = at.logo_emoji;
    document.getElementById('hn').textContent = ht.name;
    document.getElementById('an').textContent = at.name;
    document.getElementById('hs').textContent = m.home_score;
    document.getElementById('as').textContent = m.away_score;
    document.getElementById('period').textContent =
      sport === 'volleyball' ? 'SET ' + m.period : 'Q' + m.period;

    const liveTag = document.getElementById('liveTag');
    if (m.status === 'live') {
      liveTag.style.display = '';
      liveTag.textContent = '● LIVE';
    } else if (m.status === 'final') {
      liveTag.style.display = '';
      liveTag.textContent = 'FINAL';
      liveTag.style.background = '#64748b';
      liveTag.style.animation = 'none';
    } else {
      liveTag.style.display = 'none';
    }

    // Colors
    const bar = document.getElementById('overlayBar');
    bar.style.setProperty('--hc', ht.color);
    bar.style.setProperty('--hc2', adjustColor(ht.color, -30));
    bar.style.setProperty('--ac', at.color);
    bar.style.setProperty('--ac2', adjustColor(at.color, -30));

    // Full stats
    const stats = d.player_stats || [];
    if (sport === 'basketball') {
      document.getElementById('fullHead').innerHTML =
        '<tr><th>Player</th><th>Team</th><th>PTS</th><th>AST</th><th>REB</th><th>FLS</th></tr>';
      document.getElementById('fullBody').innerHTML = stats.map(p => `
        <tr><td>${p.name}</td><td>${p.team}</td><td><b>${p.points||0}</b></td>
        <td>${p.assists||0}</td><td>${p.rebounds||0}</td><td>${p.fouls||0}</td></tr>
      `).join('');
    } else {
      document.getElementById('fullHead').innerHTML =
        '<tr><th>Player</th><th>Team</th><th>K</th><th>ACE</th><th>BLK</th><th>DIG</th></tr>';
      document.getElementById('fullBody').innerHTML = stats.map(p => `
        <tr><td>${p.name}</td><td>${p.team}</td><td><b>${p.kills||0}</b></td>
        <td>${p.aces||0}</td><td>${p.blocks||0}</td><td>${p.digs||0}</td></tr>
      `).join('');
    }
  } catch(e) {}
}

if (matchId) {
  load();
  setInterval(load, 2000);
}
</script>
</body>
</html>
