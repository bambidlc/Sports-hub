<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Scoreboard Overlay - Sports Hub</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Unbounded:wght@500;700&display=swap');

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Space Grotesk", "Segoe UI", sans-serif;
      background: transparent;
      color: #fff;
      overflow: hidden;
    }

    .overlay-container {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .sport-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 20px;
      background: rgba(15, 23, 42, 0.85);
      border: 1px solid rgba(148, 163, 184, 0.3);
      border-radius: 8px;
      backdrop-filter: blur(4px);
      font-size: 0.85rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    .sport-icon {
      font-size: 1.2rem;
    }

    .live-indicator {
      display: flex;
      align-items: center;
      gap: 6px;
      color: #4ade80;
    }

    .live-dot {
      width: 8px;
      height: 8px;
      background: #4ade80;
      border-radius: 50%;
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .scoreboard {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 0;
      background: linear-gradient(180deg, rgba(15, 23, 42, 0.95), rgba(15, 23, 42, 0.85));
      border: 1px solid rgba(148, 163, 184, 0.35);
      border-radius: 12px;
      backdrop-filter: blur(8px);
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    }

    .team-section {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px 24px;
    }

    .team-section.away {
      flex-direction: row-reverse;
    }

    .team-color {
      width: 6px;
      height: 50px;
      border-radius: 3px;
    }

    .team-info {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .team-section.away .team-info {
      text-align: right;
    }

    .team-name {
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .team-score {
      font-family: "Unbounded", "Space Grotesk", sans-serif;
      font-size: 2.8rem;
      font-weight: 700;
      line-height: 1;
    }

    .center-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 12px 20px;
      background: rgba(0, 0, 0, 0.3);
      border-left: 1px solid rgba(148, 163, 184, 0.2);
      border-right: 1px solid rgba(148, 163, 184, 0.2);
    }

    .period {
      font-family: "Unbounded", "Space Grotesk", sans-serif;
      font-size: 1.2rem;
      font-weight: 500;
      color: #fcd34d;
    }

    .clock {
      font-family: "Unbounded", "Space Grotesk", sans-serif;
      font-size: 1.6rem;
      font-weight: 700;
      color: #7dd3fc;
    }

    .fouls-section {
      display: flex;
      justify-content: space-between;
      width: 100%;
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid rgba(148, 163, 184, 0.2);
    }

    .fouls {
      font-size: 0.75rem;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .fouls-value {
      color: #f87171;
      font-weight: 600;
    }

    /* Alternative compact style */
    .overlay-compact {
      position: fixed;
      top: 40px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 0;
      background: rgba(15, 23, 42, 0.9);
      border: 1px solid rgba(148, 163, 184, 0.3);
      border-radius: 8px;
      backdrop-filter: blur(4px);
      overflow: hidden;
    }

    .compact-team {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
    }

    .compact-team.away {
      flex-direction: row-reverse;
    }

    .compact-name {
      font-size: 0.9rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .compact-score {
      font-family: "Unbounded", "Space Grotesk", sans-serif;
      font-size: 1.8rem;
      font-weight: 700;
    }

    .compact-center {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 8px 14px;
      background: rgba(0, 0, 0, 0.3);
      border-left: 1px solid rgba(148, 163, 184, 0.2);
      border-right: 1px solid rgba(148, 163, 184, 0.2);
    }

    .compact-period {
      font-size: 0.8rem;
      font-weight: 600;
      color: #fcd34d;
    }

    .compact-clock {
      font-family: "Unbounded", "Space Grotesk", sans-serif;
      font-size: 1rem;
      color: #7dd3fc;
    }

    /* Hidden state */
    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>
  <!-- Main Scoreboard Overlay -->
  <div class="overlay-container" id="mainOverlay">
    <div class="sport-header">
      <span class="sport-icon" id="sportIcon">🏀</span>
      <span id="sportName">BASKETBALL</span>
      <div class="live-indicator">
        <div class="live-dot"></div>
        <span>LIVE</span>
      </div>
    </div>
    
    <div class="scoreboard">
      <div class="team-section home">
        <div class="team-color" id="homeColor" style="background: #3b82f6;"></div>
        <div class="team-info">
          <div class="team-name" id="homeTeamName">HOME</div>
          <div class="team-score" id="homeScore">0</div>
        </div>
      </div>
      
      <div class="center-section">
        <div class="period" id="period">Q1</div>
        <div class="clock" id="clock">12:00</div>
        <div class="fouls-section">
          <div class="fouls">Fouls: <span class="fouls-value" id="homeFouls">0</span></div>
          <div class="fouls">Fouls: <span class="fouls-value" id="awayFouls">0</span></div>
        </div>
      </div>
      
      <div class="team-section away">
        <div class="team-color" id="awayColor" style="background: #ef4444;"></div>
        <div class="team-info">
          <div class="team-name" id="awayTeamName">AWAY</div>
          <div class="team-score" id="awayScore">0</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Compact Overlay (alternative) -->
  <div class="overlay-compact hidden" id="compactOverlay">
    <div class="compact-team home">
      <div class="compact-name" id="compactHomeName">HOME</div>
      <div class="compact-score" id="compactHomeScore">0</div>
    </div>
    <div class="compact-center">
      <div class="compact-period" id="compactPeriod">Q1</div>
      <div class="compact-clock" id="compactClock">12:00</div>
    </div>
    <div class="compact-team away">
      <div class="compact-name" id="compactAwayName">AWAY</div>
      <div class="compact-score" id="compactAwayScore">0</div>
    </div>
  </div>

  <script>
    let session = null;
    let stats = null;

    const sportIcons = {
      basketball: '🏀', soccer: '⚽', football: '🏈',
      volleyball: '🏐', hockey: '🏒', tennis: '🎾'
    };

    async function loadSession() {
      try {
        const res = await fetch('/api/session');
        const data = await res.json();
        session = data.session;
        
        if (session) {
          document.getElementById('homeTeamName').textContent = session.home_team_name || 'HOME';
          document.getElementById('awayTeamName').textContent = session.away_team_name || 'AWAY';
          document.getElementById('compactHomeName').textContent = session.home_team_name || 'HOME';
          document.getElementById('compactAwayName').textContent = session.away_team_name || 'AWAY';
          
          document.getElementById('homeColor').style.background = session.home_color || '#3b82f6';
          document.getElementById('awayColor').style.background = session.away_color || '#ef4444';
          
          document.getElementById('sportIcon').textContent = sportIcons[session.sport] || '🏀';
          document.getElementById('sportName').textContent = (session.sport || 'Basketball').toUpperCase();
          
          updateClock(session.clock_seconds || 720);
          updatePeriod(session.period || 1);
        }
      } catch (err) {
        console.error('Failed to load session:', err);
      }
    }

    async function loadStats() {
      try {
        const res = await fetch('/api/stats');
        stats = await res.json();
        
        document.getElementById('homeScore').textContent = stats.home_score || 0;
        document.getElementById('awayScore').textContent = stats.away_score || 0;
        document.getElementById('compactHomeScore').textContent = stats.home_score || 0;
        document.getElementById('compactAwayScore').textContent = stats.away_score || 0;
        
        document.getElementById('homeFouls').textContent = stats.home_fouls || 0;
        document.getElementById('awayFouls').textContent = stats.away_fouls || 0;
      } catch (err) {
        console.error('Failed to load stats:', err);
      }
    }

    function updateClock(seconds) {
      const mins = Math.floor(seconds / 60);
      const secs = seconds % 60;
      const display = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
      document.getElementById('clock').textContent = display;
      document.getElementById('compactClock').textContent = display;
    }

    function updatePeriod(period) {
      const periodNames = ['Q1', 'Q2', 'Q3', 'Q4', 'OT'];
      const display = periodNames[period - 1] || 'Q1';
      document.getElementById('period').textContent = display;
      document.getElementById('compactPeriod').textContent = display;
    }

    // Check URL params for overlay style
    const params = new URLSearchParams(window.location.search);
    if (params.get('style') === 'compact') {
      document.getElementById('mainOverlay').classList.add('hidden');
      document.getElementById('compactOverlay').classList.remove('hidden');
    }

    // Initialize
    loadSession();
    loadStats();

    // Refresh data frequently
    setInterval(loadStats, 1000);
    setInterval(loadSession, 5000);
  </script>
</body>
</html>
