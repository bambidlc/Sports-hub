<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>Sports Hub</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Unbounded:wght@500;700;800&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f0f4ff;
  --card:#ffffff;
  --text:#1e293b;
  --muted:#64748b;
  --bball:#ff6b2b;
  --bball2:#ffa726;
  --vball:#6366f1;
  --vball2:#06b6d4;
  --green:#10b981;
  --shadow:0 8px 32px rgba(0,0,0,0.08);
  --radius:20px;
}
body{
  font-family:"Inter","Segoe UI",sans-serif;
  color:var(--text);
  min-height:100vh;
  background:
    radial-gradient(ellipse at 20% 0%,rgba(255,107,43,0.15),transparent 50%),
    radial-gradient(ellipse at 80% 0%,rgba(99,102,241,0.15),transparent 50%),
    radial-gradient(ellipse at 50% 100%,rgba(16,185,129,0.1),transparent 50%),
    linear-gradient(180deg,#f0f4ff 0%,#e8eeff 100%);
}
.app{max-width:900px;margin:0 auto;padding:24px 16px}

/* Header */
.header{text-align:center;padding:40px 0 32px}
.header h1{
  font-family:"Unbounded",sans-serif;font-size:2.6rem;font-weight:800;
  background:linear-gradient(135deg,var(--bball),var(--vball),var(--green));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  letter-spacing:0.02em;
}
.header p{color:var(--muted);font-size:1.05rem;margin-top:8px;font-weight:500}

/* Sport cards */
.sport-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:32px}
.sport-card{
  background:var(--card);border-radius:var(--radius);padding:32px 24px;
  text-align:center;cursor:pointer;transition:all .25s ease;
  box-shadow:var(--shadow);border:2px solid transparent;position:relative;overflow:hidden;
}
.sport-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:5px;
}
.sport-card.basketball::before{background:linear-gradient(90deg,var(--bball),var(--bball2))}
.sport-card.volleyball::before{background:linear-gradient(90deg,var(--vball),var(--vball2))}
.sport-card:hover{transform:translateY(-4px);box-shadow:0 16px 48px rgba(0,0,0,0.12)}
.sport-card.basketball:hover{border-color:var(--bball)}
.sport-card.volleyball:hover{border-color:var(--vball)}
.sport-card .emoji{font-size:3.5rem;margin-bottom:12px;display:block}
.sport-card h2{font-family:"Unbounded",sans-serif;font-size:1.3rem;font-weight:700;margin-bottom:6px}
.sport-card p{color:var(--muted);font-size:0.88rem}

/* Section titles */
.section-title{
  font-family:"Unbounded",sans-serif;font-size:1rem;font-weight:700;
  text-transform:uppercase;letter-spacing:0.1em;color:var(--muted);
  margin-bottom:16px;padding-left:4px;
}
.section-title span{
  background:linear-gradient(90deg,var(--bball),var(--vball));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}

/* Quick actions */
.actions{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:32px}
.action-btn{
  display:flex;align-items:center;gap:12px;padding:18px 20px;
  background:var(--card);border:none;border-radius:16px;cursor:pointer;
  box-shadow:var(--shadow);transition:all .2s;font-size:0.95rem;
  font-weight:600;color:var(--text);font-family:inherit;
}
.action-btn:hover{transform:translateY(-2px);box-shadow:0 12px 36px rgba(0,0,0,0.12)}
.action-btn .icon{
  width:44px;height:44px;border-radius:12px;display:flex;
  align-items:center;justify-content:center;font-size:1.3rem;flex-shrink:0;
}
.action-btn.teams .icon{background:linear-gradient(135deg,#dbeafe,#c7d2fe);color:#4f46e5}
.action-btn.matches .icon{background:linear-gradient(135deg,#fce7f3,#fecdd3);color:#e11d48}
.action-btn.live .icon{background:linear-gradient(135deg,#d1fae5,#a7f3d0);color:#059669}
.action-btn.stream .icon{background:linear-gradient(135deg,#fef3c7,#fde68a);color:#d97706}

/* Live matches */
.matches-list{display:grid;gap:12px;margin-bottom:32px}
.match-card{
  display:grid;grid-template-columns:1fr auto 1fr auto;align-items:center;gap:16px;
  background:var(--card);border-radius:16px;padding:16px 20px;
  box-shadow:var(--shadow);cursor:pointer;transition:all .2s;
}
.match-card:hover{transform:translateY(-2px);box-shadow:0 12px 36px rgba(0,0,0,0.12)}
.match-team{display:flex;align-items:center;gap:10px}
.match-team.away{flex-direction:row-reverse;text-align:right}
.team-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.match-team .name{font-weight:700;font-size:0.95rem}
.match-score{
  font-family:"Unbounded",sans-serif;font-size:1.3rem;font-weight:800;
  text-align:center;min-width:80px;
}
.match-score .vs{font-size:0.8rem;color:var(--muted);font-weight:500}
.match-status{
  font-size:0.7rem;text-transform:uppercase;letter-spacing:0.1em;
  padding:4px 10px;border-radius:999px;font-weight:700;
}
.match-status.live{background:#dcfce7;color:#16a34a}
.match-status.pending{background:#fef3c7;color:#d97706}
.match-status.final{background:#f1f5f9;color:#64748b}

.empty-state{
  text-align:center;padding:48px 24px;color:var(--muted);
  background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);
}
.empty-state .emoji{font-size:3rem;margin-bottom:12px;display:block}
.empty-state p{font-size:1.05rem;font-weight:500}

/* Modal overlay */
.modal-bg{
  position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.3);
  backdrop-filter:blur(4px);z-index:100;display:none;align-items:center;justify-content:center;
}
.modal-bg.open{display:flex}
.modal{
  background:var(--card);border-radius:var(--radius);padding:32px;
  max-width:480px;width:90%;box-shadow:0 24px 64px rgba(0,0,0,0.2);
}
.modal h2{font-family:"Unbounded",sans-serif;font-size:1.2rem;margin-bottom:20px}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-weight:600;font-size:0.85rem;margin-bottom:6px;color:var(--muted)}
.form-group select,.form-group input{
  width:100%;padding:12px 14px;border:2px solid #e2e8f0;border-radius:12px;
  font-size:0.95rem;font-family:inherit;background:var(--bg);color:var(--text);
  outline:none;transition:border .2s;
}
.form-group select:focus,.form-group input:focus{border-color:var(--vball)}
.btn-row{display:flex;gap:10px;margin-top:20px}
.btn{
  flex:1;padding:14px;border:none;border-radius:14px;font-size:0.95rem;
  font-weight:700;cursor:pointer;font-family:inherit;transition:all .2s;
}
.btn.primary{
  background:linear-gradient(135deg,var(--bball),var(--vball));color:#fff;
}
.btn.primary:hover{opacity:0.9;transform:translateY(-1px)}
.btn.cancel{background:#f1f5f9;color:var(--muted)}
.btn.cancel:hover{background:#e2e8f0}

@media(max-width:600px){
  .sport-grid,.actions{grid-template-columns:1fr}
  .header h1{font-size:1.8rem}
  .match-card{grid-template-columns:1fr auto 1fr;gap:8px}
  .match-status{grid-column:1/-1;justify-self:center}
}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>⚡ SPORTS HUB</h1>
    <p>Basketball & Volleyball — Live Stats & Streaming</p>
  </div>

  <div class="sport-grid">
    <div class="sport-card basketball" onclick="filterSport('basketball')">
      <span class="emoji">🏀</span>
      <h2>Basketball</h2>
      <p>Points, assists, rebounds, fouls & more</p>
    </div>
    <div class="sport-card volleyball" onclick="filterSport('volleyball')">
      <span class="emoji">🏐</span>
      <h2>Volleyball</h2>
      <p>Kills, aces, blocks, digs & more</p>
    </div>
  </div>

  <div class="section-title"><span>Quick Actions</span></div>
  <div class="actions">
    <button class="action-btn teams" onclick="location.href='/teams'">
      <div class="icon">👥</div>
      <span>Manage Teams & Rosters</span>
    </button>
    <button class="action-btn matches" onclick="openNewMatch()">
      <div class="icon">🆕</div>
      <span>Create New Match</span>
    </button>
    <button class="action-btn live" onclick="location.href='/desk?id='+getLatestLive()">
      <div class="icon">📊</div>
      <span>Open Score Desk</span>
    </button>
    <button class="action-btn stream" onclick="location.href='/overlay?id='+getLatestLive()">
      <div class="icon">📱</div>
      <span>Stream Overlay (iPhone)</span>
    </button>
  </div>

  <div class="section-title"><span>Recent Matches</span></div>
  <div class="matches-list" id="matchesList">
    <div class="empty-state">
      <span class="emoji">🏟️</span>
      <p>No matches yet — create one to get started!</p>
    </div>
  </div>
</div>

<!-- New Match Modal -->
<div class="modal-bg" id="newMatchModal">
  <div class="modal">
    <h2>🆕 New Match</h2>
    <div class="form-group">
      <label>Sport</label>
      <select id="matchSport" onchange="loadTeamsForMatch()">
        <option value="basketball">🏀 Basketball</option>
        <option value="volleyball">🏐 Volleyball</option>
      </select>
    </div>
    <div class="form-group">
      <label>Tournament / Event Name</label>
      <input type="text" id="matchTournament" placeholder="e.g. City League 2026"/>
    </div>
    <div class="form-group">
      <label>Home Team</label>
      <select id="matchHome"><option value="">— Select —</option></select>
    </div>
    <div class="form-group">
      <label>Away Team</label>
      <select id="matchAway"><option value="">— Select —</option></select>
    </div>
    <div class="btn-row">
      <button class="btn cancel" onclick="closeModal()">Cancel</button>
      <button class="btn primary" onclick="createMatch()">Create Match</button>
    </div>
  </div>
</div>

<script>
const API = '';
let allMatches = [];
let currentSportFilter = null;

async function api(path, body) {
  const opts = body ? {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)} : {};
  const r = await fetch(API + path, opts);
  return r.json();
}

function getLatestLive() {
  const live = allMatches.find(m => m.status === 'live');
  return live ? live.id : (allMatches[0]?.id || '');
}

function filterSport(sport) {
  currentSportFilter = currentSportFilter === sport ? null : sport;
  document.querySelectorAll('.sport-card').forEach(c => {
    c.style.opacity = (!currentSportFilter || c.classList.contains(currentSportFilter)) ? '1' : '0.4';
  });
  renderMatches();
}

function renderMatches() {
  const list = document.getElementById('matchesList');
  let filtered = currentSportFilter ? allMatches.filter(m => m.sport === currentSportFilter) : allMatches;
  if (!filtered.length) {
    list.innerHTML = `<div class="empty-state"><span class="emoji">🏟️</span><p>No matches yet — create one to get started!</p></div>`;
    return;
  }
  list.innerHTML = filtered.map(m => {
    const statusCls = m.status === 'live' ? 'live' : m.status === 'pending' ? 'pending' : 'final';
    const statusTxt = m.status === 'live' ? '🔴 LIVE' : m.status === 'pending' ? 'Upcoming' : 'Final';
    const emoji = m.sport === 'volleyball' ? '🏐' : '🏀';
    return `
    <div class="match-card" onclick="openMatch(${m.id})">
      <div class="match-team">
        <div class="team-dot" style="background:${m.home_color}"></div>
        <span class="name">${emoji} ${m.home_name}</span>
      </div>
      <div class="match-score">
        ${m.status === 'pending' ? '<span class="vs">VS</span>' : m.home_score + ' – ' + m.away_score}
      </div>
      <div class="match-team away">
        <div class="team-dot" style="background:${m.away_color}"></div>
        <span class="name">${m.away_name}</span>
      </div>
      <div class="match-status ${statusCls}">${statusTxt}</div>
    </div>`;
  }).join('');
}

function openMatch(id) {
  location.href = '/desk?id=' + id;
}

async function loadMatches() {
  const data = await api('/api/matches');
  allMatches = data.matches || [];
  renderMatches();
}

function openNewMatch() {
  document.getElementById('newMatchModal').classList.add('open');
  loadTeamsForMatch();
}
function closeModal() {
  document.getElementById('newMatchModal').classList.remove('open');
}

async function loadTeamsForMatch() {
  const sport = document.getElementById('matchSport').value;
  const data = await api('/api/teams?sport=' + sport);
  const teams = data.teams || [];
  const opts = '<option value="">— Select —</option>' + teams.map(t =>
    `<option value="${t.id}">${t.logo_emoji} ${t.name}</option>`
  ).join('');
  document.getElementById('matchHome').innerHTML = opts;
  document.getElementById('matchAway').innerHTML = opts;
}

async function createMatch() {
  const sport = document.getElementById('matchSport').value;
  const home = document.getElementById('matchHome').value;
  const away = document.getElementById('matchAway').value;
  const tourney = document.getElementById('matchTournament').value;
  if (!home || !away) { alert('Select both teams'); return; }
  if (home === away) { alert('Teams must be different'); return; }
  const data = await api('/api/matches', {
    sport, home_team_id: parseInt(home), away_team_id: parseInt(away),
    tournament_name: tourney
  });
  closeModal();
  await loadMatches();
  if (data.match_id) openMatch(data.match_id);
}

loadMatches();
</script>
</body>
</html>
