<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Courtside Live Dashboard</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&family=Unbounded:wght@600&display=swap');

    :root {
      --bg: #ffffff;
      --panel: #ffffff;
      --panel-strong: #ffffff;
      --accent: #F4AB5D;
      --accent-2: #F4AB5D;
      --text: #2c1d12;
      --muted: rgba(44, 29, 18, 0.6);
      --border: rgba(244, 171, 93, 0.3);
      --shadow: 0 16px 32px rgba(244, 171, 93, 0.2);
      --success: #F4AB5D;
      --danger: #F4AB5D;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Space Grotesk", "Avenir Next", "Futura", sans-serif;
      color: var(--text);
      background: linear-gradient(180deg, #ffffff 0%, rgba(244, 171, 93, 0.12) 100%);
      min-height: 100vh;
    }

    .shell {
      padding: 18px;
      display: grid;
      gap: 16px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: var(--shadow);
      padding: 16px;
      animation: fadeUp 0.4s ease;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo {
      width: 44px;
      height: 44px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      background: linear-gradient(140deg, rgba(244, 171, 93, 0.9), rgba(255, 255, 255, 0.9));
      font-family: "Unbounded", "Space Grotesk", sans-serif;
      font-size: 1.1rem;
      letter-spacing: 0.08em;
    }

    .brand-title {
      font-family: "Unbounded", "Space Grotesk", sans-serif;
      font-size: 1.1rem;
      letter-spacing: 0.05em;
    }

    .brand-subtitle {
      color: var(--muted);
      font-size: 0.85rem;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      border-radius: 999px;
      background: rgba(244, 171, 93, 0.16);
      border: 1px solid var(--border);
      font-size: 0.8rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .status-pill.live { background: rgba(244, 171, 93, 0.25); color: var(--text); }
    .status-pill.final { background: rgba(244, 171, 93, 0.2); color: var(--text); }
    .status-pill.idle { background: rgba(244, 171, 93, 0.1); color: var(--muted); }

    .selector {
      display: grid;
      gap: 12px;
      background: var(--panel-strong);
    }

    .selector-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .eyebrow {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: var(--muted);
    }

    .selector-title {
      font-family: "Unbounded", "Space Grotesk", sans-serif;
      font-size: 1.05rem;
    }

    .selector-controls {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
    }

    select, button {
      font-family: inherit;
    }

    select {
      background: #ffffff;
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 12px;
      font-size: 0.95rem;
    }

    button {
      border: none;
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.12s ease, box-shadow 0.12s ease;
    }

    button:hover { transform: translateY(-1px); }

    .primary {
      background: var(--accent);
      color: #ffffff;
      box-shadow: 0 10px 22px rgba(244, 171, 93, 0.35);
    }

    .ghost {
      background: rgba(244, 171, 93, 0.12);
      border: 1px solid var(--border);
      color: var(--text);
    }

    .selector-meta {
      color: var(--muted);
      font-size: 0.85rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 16px;
    }

    .scoreboard {
      display: grid;
      gap: 12px;
    }

    .match-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .match-name {
      font-family: "Unbounded", "Space Grotesk", sans-serif;
      font-size: 1.1rem;
      letter-spacing: 0.03em;
    }

    .match-status {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: var(--muted);
    }

    .match-status.live { color: var(--accent-2); }
    .match-status.final { color: var(--accent); }
    .match-status.final { color: #fecaca; }

    .scores {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 12px;
      background: rgba(244, 171, 93, 0.12);
      border-radius: 14px;
      padding: 12px;
    }

    .team {
      display: grid;
      gap: 4px;
      justify-items: center;
    }

    .team-name {
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      color: var(--muted);
      text-align: center;
    }

    .team-score {
      font-family: "Unbounded", "Space Grotesk", sans-serif;
      font-size: 2rem;
      color: var(--accent);
    }

    .period {
      display: grid;
      gap: 6px;
      justify-items: center;
    }

    .period-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: var(--muted);
    }

    .period-value {
      font-family: "Unbounded", "Space Grotesk", sans-serif;
      font-size: 1.2rem;
      color: var(--accent-2);
    }

    .events-title {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .events-list {
      display: grid;
      gap: 8px;
      max-height: 320px;
      overflow-y: auto;
      padding-right: 2px;
    }

    .event {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: rgba(244, 171, 93, 0.08);
      font-size: 0.85rem;
      color: var(--text);
    }

    .event .meta {
      color: var(--muted);
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }

    .empty {
      color: var(--muted);
      font-size: 0.85rem;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 620px) {
      .scores { grid-template-columns: 1fr; }
      .selector-controls { grid-template-columns: 1fr; }
      .events-list { max-height: 220px; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="panel topbar">
      <div class="brand">
        <div class="logo">CS</div>
        <div>
          <div class="brand-title">Courtside Live</div>
          <div class="brand-subtitle">Match selection and live stats</div>
        </div>
      </div>
      <div class="status-pill idle" id="globalStatus">Select a match to view live stats</div>
    </header>

    <section class="panel selector">
      <div class="selector-head">
        <div>
          <div class="eyebrow">Started Games</div>
          <div class="selector-title">Choose a match</div>
        </div>
        <button class="ghost" id="refreshBtn">Refresh</button>
      </div>
      <div class="selector-controls">
        <select id="matchSelect"></select>
        <button class="primary" id="viewBtn">Activate View</button>
      </div>
      <div class="selector-meta" id="matchMeta">Waiting for started matches.</div>
    </section>

    <div class="grid">
      <section class="panel scoreboard">
        <div class="match-row">
          <div class="match-name" id="matchName">No active match</div>
          <div class="match-status" id="matchStatus">Idle</div>
        </div>
        <div class="scores">
          <div class="team">
            <div class="team-name" id="homeName">Home</div>
            <div class="team-score" id="homeScore">0</div>
          </div>
          <div class="period">
            <div class="period-label">Period</div>
            <div class="period-value" id="periodValue">-</div>
          </div>
          <div class="team">
            <div class="team-name" id="awayName">Away</div>
            <div class="team-score" id="awayScore">0</div>
          </div>
        </div>
      </section>

      <section class="panel">
        <div class="events-title">Recent Events</div>
        <div class="events-list" id="eventsList"></div>
      </section>
    </div>
  </div>

  <script>
    const matchNameEl = document.getElementById('matchName');
    const matchStatusEl = document.getElementById('matchStatus');
    const homeNameEl = document.getElementById('homeName');
    const awayNameEl = document.getElementById('awayName');
    const homeScoreEl = document.getElementById('homeScore');
    const awayScoreEl = document.getElementById('awayScore');
    const periodValueEl = document.getElementById('periodValue');
    const eventsListEl = document.getElementById('eventsList');
    const matchSelectEl = document.getElementById('matchSelect');
    const viewBtn = document.getElementById('viewBtn');
    const refreshBtn = document.getElementById('refreshBtn');
    const matchMetaEl = document.getElementById('matchMeta');
    const globalStatusEl = document.getElementById('globalStatus');

    const params = new URLSearchParams(window.location.search);
    const limit = Math.max(1, Number.parseInt(params.get('limit') || '12', 10) || 12);
    const pollMs = Math.max(1000, Number.parseInt(params.get('poll') || '3000', 10) || 3000);
    let currentMatchId = params.get('match_id') || params.get('match') || '';

    let sessions = [];
    let pollHandle = null;

    function setGlobalStatus(text, state) {
      globalStatusEl.textContent = text;
      globalStatusEl.classList.remove('idle', 'live', 'final');
      globalStatusEl.classList.add(state || 'idle');
    }

    function formatPeriod(value) {
      if (!value) return '-';
      const key = String(value).toLowerCase();
      if (key === 'ot') return 'OT';
      if (key === 'q1') return 'Q1';
      if (key === 'q2') return 'Q2';
      if (key === 'q3') return 'Q3';
      if (key === 'q4') return 'Q4';
      return String(value).toUpperCase();
    }

    function setEmptyState(message) {
      eventsListEl.innerHTML = '';
      const row = document.createElement('div');
      row.className = 'empty';
      row.textContent = message;
      eventsListEl.appendChild(row);
    }

    async function getJson(url) {
      const res = await fetch(url, { cache: 'no-store' });
      if (!res.ok) {
        return null;
      }
      return res.json();
    }

    function renderEvents(events) {
      eventsListEl.innerHTML = '';
      if (!events || events.length === 0) {
        setEmptyState('No events yet.');
        return;
      }
      const slice = events.slice(-limit).reverse();
      slice.forEach(event => {
        const row = document.createElement('div');
        row.className = 'event';
        const label = event.event_type === 'score' ? `+${event.points}` : 'Foul';
        const jersey = event.player_jersey ? `#${event.player_jersey}` : '#?';
        const name = event.player_name || 'Unknown';
        const text = document.createElement('div');
        text.textContent = `${name} ${jersey} ${label}`;
        const meta = document.createElement('div');
        meta.className = 'meta';
        meta.textContent = formatPeriod(event.period);
        row.appendChild(text);
        row.appendChild(meta);
        eventsListEl.appendChild(row);
      });
    }

    function updateScores(stats) {
      if (!stats) return;
      homeScoreEl.textContent = stats.home_score ?? 0;
      awayScoreEl.textContent = stats.away_score ?? 0;
    }

    function updateMatchMeta(sessionData) {
      if (!sessionData) {
        matchMetaEl.textContent = 'Select a match to view details.';
        return;
      }
      const teams = [sessionData.home_team_name || sessionData.home_team_id, sessionData.away_team_name || sessionData.away_team_id]
        .filter(Boolean)
        .join(' vs ');
      const startedAt = sessionData.started_at ? new Date(sessionData.started_at).toLocaleString() : '';
      matchMetaEl.textContent = [teams, startedAt].filter(Boolean).join(' | ');
    }

    function updateSession(sessionData) {
      if (!sessionData || Object.keys(sessionData).length === 0) {
        matchNameEl.textContent = 'No active match';
        matchStatusEl.textContent = 'Idle';
        matchStatusEl.classList.remove('live', 'final');
        homeNameEl.textContent = 'Home';
        awayNameEl.textContent = 'Away';
        periodValueEl.textContent = '-';
        updateMatchMeta(null);
        setEmptyState('Select a started match to view live stats.');
        setGlobalStatus('Select a match to view live stats', 'idle');
        return false;
      }
      matchNameEl.textContent = sessionData.match_name || 'Live match';
      const isFinal = Boolean(sessionData.finalized_at);
      matchStatusEl.textContent = isFinal ? 'Final' : 'Live';
      matchStatusEl.classList.toggle('final', isFinal);
      matchStatusEl.classList.toggle('live', !isFinal);
      homeNameEl.textContent = sessionData.home_team_name || sessionData.home_team_id || 'Home';
      awayNameEl.textContent = sessionData.away_team_name || sessionData.away_team_id || 'Away';
      updateMatchMeta(sessionData);
      if (isFinal) {
        const ended = new Date(sessionData.finalized_at).toLocaleTimeString();
        setGlobalStatus(`Final - ended ${ended}`, 'final');
      } else {
        setGlobalStatus('Live - updating stats', 'live');
      }
      return true;
    }

    function updatePeriodFromEvents(events) {
      if (!events || events.length === 0) {
        periodValueEl.textContent = '-';
        return;
      }
      const last = events[events.length - 1];
      periodValueEl.textContent = formatPeriod(last?.period);
    }

    function stopPolling() {
      if (pollHandle) {
        clearInterval(pollHandle);
        pollHandle = null;
      }
    }

    async function refresh(matchId) {
      if (!matchId) return;
      const sessionResp = await getJson(`/api/session?match_id=${encodeURIComponent(matchId)}`);
      const sessionOk = updateSession(sessionResp?.session);
      if (!sessionOk) return;
      const [statsResp, eventsResp] = await Promise.all([
        getJson(`/api/stats?match_id=${encodeURIComponent(matchId)}`),
        getJson(`/api/events?match_id=${encodeURIComponent(matchId)}`)
      ]);
      updateScores(statsResp);
      const events = eventsResp?.events || [];
      updatePeriodFromEvents(events);
      renderEvents(events);
      if (sessionResp?.session?.finalized_at) {
        stopPolling();
      }
    }

    async function loadSessions() {
      const data = await getJson('/api/sessions');
      sessions = data?.sessions || [];
      matchSelectEl.innerHTML = '';
      if (sessions.length === 0) {
        const opt = document.createElement('option');
        opt.value = '';
        opt.textContent = 'No started matches yet';
        matchSelectEl.appendChild(opt);
        viewBtn.disabled = true;
        setGlobalStatus('Waiting for a match to start', 'idle');
        return;
      }
      sessions.forEach(session => {
        const opt = document.createElement('option');
        opt.value = session.match_id || '';
        const statusLabel = session.finalized_at ? 'Final' : 'Live';
        opt.textContent = `${session.match_name || session.match_id} (${statusLabel})`;
        matchSelectEl.appendChild(opt);
      });
      viewBtn.disabled = false;
      if (currentMatchId) {
        matchSelectEl.value = currentMatchId;
      }
    }

    function setQueryMatch(matchId) {
      const next = new URL(window.location.href);
      next.searchParams.set('match_id', matchId);
      history.replaceState({}, '', next);
    }

    async function activateMatch(matchId) {
      if (!matchId) {
        updateSession(null);
        stopPolling();
        return;
      }
      currentMatchId = matchId;
      setQueryMatch(matchId);
      await refresh(matchId);
      stopPolling();
      pollHandle = setInterval(() => refresh(matchId), pollMs);
    }

    viewBtn.addEventListener('click', () => {
      activateMatch(matchSelectEl.value);
    });

    refreshBtn.addEventListener('click', async () => {
      await loadSessions();
      if (currentMatchId) {
        matchSelectEl.value = currentMatchId;
      }
    });

    matchSelectEl.addEventListener('change', () => {
      setGlobalStatus('Ready to activate selected match', 'idle');
    });

    (async () => {
      await loadSessions();
      if (currentMatchId) {
        await activateMatch(currentMatchId);
      } else if (sessions.length === 1) {
        await activateMatch(sessions[0].match_id);
      } else {
        updateSession(null);
      }
    })();
  </script>
</body>
</html>
